# Map for API version detection
map $uri $api_version {
    ~^/api/v1  "v1";
    ~^/api/v2  "v2";
    default    "unknown";
}

# Weighted round-robin between v1 and v2
upstream api_pool {
    server api_v1:5000 weight=3;   # 75% traffic
    server api_v2:5000 weight=1;   # 25% traffic
    keepalive 16;
    keepalive_requests 100;
    keepalive_timeout  30s;
}

# Least-connections with slow service
upstream api_fair {
    least_conn;
    server api_v1:5000;
    server api_v2:5000;
    server api_slow:5000 max_fails=2 fail_timeout=10s;
}

# IP-hash: sticky sessions
upstream api_sticky {
    ip_hash;
    server api_v1:5000;
    server api_v2:5000;
}

server {
    listen  80;
    server_name  api.localhost;

    # Proxy /api/v1 → api_v1 service
    location /api/v1 {
        proxy_pass         http://api_v1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_set_header   X-API-Version      $api_version;
        proxy_connect_timeout   5s;
        proxy_send_timeout     10s;
        proxy_read_timeout     30s;
        proxy_buffering         on;
        proxy_buffer_size      4k;
        proxy_buffers         8 4k;
    }

    # Proxy /api/v2 → api_v2 service
    location /api/v2 {
        proxy_pass         http://api_v2:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout   30s;
    }

    # Rewrite: /api without version → /api/v2 (latest)
    location = /api {
        return 302 /api/v2/info;
    }

    # Weighted round-robin load balancing
    location /api/lb {
        proxy_pass         http://api_pool;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host       $host;
        proxy_next_upstream error timeout http_500 http_502 http_503;
        proxy_next_upstream_tries     3;
        proxy_next_upstream_timeout  10s;
        add_header X-Upstream-Addr   $upstream_addr   always;
        add_header X-Upstream-Status $upstream_status always;
    }

    # Least-connections (with slow server)
    location /api/fair {
        proxy_pass         http://api_fair;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_read_timeout 5s;
        proxy_next_upstream timeout error;
        add_header X-Upstream-Addr $upstream_addr always;
    }

    # IP-hash (sticky)
    location /api/sticky {
        proxy_pass         http://api_sticky;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        add_header X-Upstream-Addr $upstream_addr always;
    }

    # Cached endpoint
    location /api/cached {
        proxy_pass         http://api_pool;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_cache              api_cache;
        proxy_cache_valid        200  30s;
        proxy_cache_valid        404   5s;
        proxy_cache_methods      GET;
        proxy_cache_use_stale    error timeout updating;
        proxy_cache_lock         on;
        add_header  X-Cache-Status  $upstream_cache_status  always;
        add_header  X-Upstream-Addr $upstream_addr          always;
        proxy_cache_bypass  $http_pragma $http_authorization;
    }
}
