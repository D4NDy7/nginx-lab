server {
    listen       80 default_server;
    server_name  localhost 127.0.0.1;

    root   /usr/share/nginx/html;
    index  index.html;

    # Browser cache for static assets
    location ~* \.(css|js|png|jpg|ico|woff2)$ {
        expires     30d;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # Main route
    location / {
        try_files $uri $uri/ =404;
    }

    # Status page (localhost only)
    location /nginx_status {
        stub_status;
        allow  127.0.0.1;
        allow  172.0.0.0/8;
        deny   all;
    }

    # Redirect /old-api → /api (301 Permanent)
    location /old-api {
        return 301 /api$request_uri;
    }

    # Exact match — faster than regular location
    location = /favicon.ico {
        log_not_found  off;
        access_log     off;
        return 204;
    }

    # Block access to .env and hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    # Rewrite with capture group
    location /blog {
        rewrite ^/blog/(\d+)$ /articles?id=$1 last;
        return 404;
    }

    # Custom: redirect /docs → /api/v2/info
    location /docs {
        return 302 /api/v2/info;
    }

    # X-Request-ID header
    add_header X-Request-ID $request_id always;

    error_page  404              /404.html;
    error_page  500 502 503 504  /50x.html;
}
