# Rate limit zones
limit_req_zone  $binary_remote_addr  zone=api_ratelimit:10m  rate=10r/s;
limit_req_zone  $binary_remote_addr  zone=auth_ratelimit:5m  rate=5r/m;
limit_conn_zone $binary_remote_addr  zone=conn_limit:10m;

server {
    listen      80;
    server_name secure.localhost;

    # Security headers
    add_header  X-Frame-Options           "SAMEORIGIN"                      always;
    add_header  X-Content-Type-Options    "nosniff"                         always;
    add_header  X-XSS-Protection          "1; mode=block"                   always;
    add_header  Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header  Permissions-Policy        "geolocation=(), microphone=()"   always;
    add_header  Content-Security-Policy   "default-src 'self'"              always;

    # API with rate limiting
    location /api {
        limit_req   zone=api_ratelimit  burst=5  nodelay;
        limit_req_status  429;
        limit_conn  conn_limit  10;
        proxy_pass        http://api_pool;
        proxy_set_header  Host      $host;
        proxy_set_header  X-Real-IP $remote_addr;
    }

    # Auth endpoint — strict limit
    location /auth {
        limit_req   zone=auth_ratelimit  burst=3;
        limit_req_status  429;
        add_header  Content-Type  "application/json" always;
        return 200 '{"auth":"mock endpoint"}';
    }

    # ACL: only local IPs to /admin
    location /admin {
        allow  127.0.0.1;
        allow  172.0.0.0/8;
        deny   all;
        add_header Content-Type "application/json" always;
        return 200 '{"admin":"access granted"}';
    }

    # Basic Auth
    location /private {
        auth_basic            "Restricted Area";
        auth_basic_user_file  /etc/nginx/ssl/.htpasswd;
        root                  /usr/share/nginx/html;
        default_type          application/json;
        try_files             /private.json =404;
    }
}
